<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — State of AI in HK Marketing</title>
    <meta name="robots" content="noindex" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
        background: #fff;
        color: #374151;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container { text-align: center; padding: 2rem; }
      .accent { color: #D63425; }
      .code { font-size: 4rem; font-weight: 700; letter-spacing: -2px; color: #D63425; }
      .title { font-size: 1.25rem; font-weight: 600; margin: 0.75rem 0 0.5rem; }
      .desc { font-size: 0.875rem; color: #9ca3af; margin-bottom: 1.5rem; }
      .back {
        display: inline-block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #D63425;
        text-decoration: none;
        border: 1.5px solid #D63425;
        padding: 0.5rem 1.25rem;
        border-radius: 6px;
      }
      .back:hover { background: #fef2f1; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <h1 class="title">Page not found</h1>
      <p class="desc">This page doesn't exist or may have moved.</p>
      <a class="back" href="/">← Back to Knowledge Base</a>
    </div>
  </body>
</html>
