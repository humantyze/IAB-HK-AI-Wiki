kind = "web"
previewPath = "/"
title = "State of AI in HK Marketing"
version = "1.0.0"
id = "artifacts/report"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20970

[services.development]
run = "pnpm --filter @workspace/report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/report", "run", "build" ]
publicDir = "artifacts/report/dist/public"
serve = "static"

# Admin routes still need SPA routing (no prerendered files for these)
[[services.production.rewrites]]
from = "/admin"
to = "/index.html"

[[services.production.rewrites]]
from = "/admin/*"
to = "/index.html"

[[services.production.rewrites]]
from = "/super-admin"
to = "/index.html"

[[services.production.rewrites]]
from = "/super-admin/*"
to = "/index.html"

# Public routes (/, /wiki/:slug, /sections/:slug) are served from prerendered
# static files. Unknown slugs have no matching file and return HTTP 404.

[services.env]
PORT = "20970"
BASE_PATH = "/"
